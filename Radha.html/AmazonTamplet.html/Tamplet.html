<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color: ghostwhite;
        margin: 20px;
    }
    .box{
        margin: 200px;
        width: 80vw;
        height: 40vh;
        border: 1px solid blanchedalmond;
        box-shadow: -3px -3px 5px white,
                      3px 3px 5px;
        border-radius: 20px;              
    }
    h1{
        width: 50%;
        height: 50px;
        margin: 50px;
        border: 1px solid red;
        box-shadow: -3px -3px 5px red,
                      3px 3px 5px;
        border-radius: 20px;
        text-align: center;
        line-height: 50px;
    }
    h2{
        width: 50%;
        height: 50px;
        margin: 50px;
        border: 1px solid red;
        box-shadow: -3px -3px 5px red,
                      3px 3px 5px;
        border-radius: 20px;
        text-align: center;
        line-height: 50px;
    }
</style>
<body>
    <div class="box">
        <h1>Heading</h1>
    </div>
    <div class="box">
        <h2>Heading2</h2>
    </div>
</body>
</html>
