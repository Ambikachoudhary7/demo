<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neumorphism Profile Card</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#e6e6e6;
    }

    .card{
      width:320px;
      padding:25px;
      border-radius:20px;
      background:#e6e6e6;

      box-shadow:
      8px 8px 15px #c5c5c5,
      -8px -8px 15px #ffffff;

      text-align:center;
    }

    .top-icons{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
      color:#777;
      font-size:18px;
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      padding:5px;
      background:#e6e6e6;

      box-shadow:
      6px 6px 12px #c5c5c5,
      -6px -6px 12px #ffffff;
    }

    h2{
      margin-top:15px;
      color:#333;
    }

    p{
      color:#777;
      margin-top:5px;
      margin-bottom:20px;
    }

    .social-icons{
      display:flex;
      justify-content:center;
      gap:15px;
      margin-bottom:25px;
    }

    .social-icons a{
      width:40px;
      height:40px;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      color:#555;
      background:#e6e6e6;

      box-shadow:
      5px 5px 10px #c5c5c5,
      -5px -5px 10px #ffffff;
    }

    .buttons{
      display:flex;
      justify-content:space-between;
      gap:15px;
      margin-bottom:25px;
    }

    .buttons button{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      background:#e6e6e6;

      box-shadow:
      5px 5px 10px #c5c5c5,
      -5px -5px 10px #ffffff;
    }

    .stats{
      display:flex;
      justify-content:space-around;
      color:#555;
      margin-top:10px;
    }

    .stats div{
      display:flex;
      align-items:center;
      gap:5px;
      font-size:15px;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="top-icons">
      <i class="fa-solid fa-arrow-left"></i>
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <img src="IMG_20251028_053104278_HDR.jpg"
         alt="profile"
         class="profile-img">

    <h2>Ambika</h2>
    <p>Developer</p>

    <div class="social-icons">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <div class="buttons">
      <button>Message</button>
      <button>Subscribe</button>
    </div>

    <div class="stats">
      <div>
        <i class="fa-regular fa-heart"></i>
        <span>20.4k</span>
      </div>

      <div>
        <i class="fa-regular fa-comment"></i>
        <span>14.3k</span>
      </div>

      <div>
        <i class="fa-solid fa-share"></i>
        <span>12.8k</span>
      </div>
    </div>

  </div>

</body>
</html>
