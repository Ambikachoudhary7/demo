<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Form to Apply</title>
</head>
<body>
    <h1 style="color: aqua; text-align: center;">All document Fill is Compulsory</h1>
    <form action="post">
        <label for="Name">Full name</label>
        <input type="text" name="Full name" id="Full name">
        <br><br>
        <label for="email">Email</label>
        <input type="email" id="email">
        <br><br>
        <label for="Number">Contact number</label>
        <input type="tel" name="number" id="number">
        <br><br>
        <label>Gender: </label>
        <label for="Gender">Male</label>
        <input type="radio" name="Gender" id="Gender" value="Male">
        <label for="Gender"> Female</label>
        <input type="radio" id="Gender" name="Gender" value="Female">
        <br><br>
        <label for="Skill">Skill: </label>
         <label for="Skill">C Language</label>
        <input type="checkbox" name="Skill" id="Skill" value="C language">
        <label for="Skill">Java Language</label>
        <input type="checkbox" id="Skill" name="Skill" value="Java Language">
         <label for="Skill">C++ Language</label>
        <input type="checkbox" id="Skill" name="Skill" value="C++ Language">
        <br><br>
        <label for="Qualification">Qualification</label>
        <select name="Qualification" id="Qualification">
            <option value="">select--</option>
            <option value="10th">10th</option>
            <option value="12th">12th</option>
            <option value="graduation">graduation</option>
            <option value="post">post-Gratution</option>
        </select>
        <br><br>
        <label for="address">address</label>
        <textarea name="address" id="address" cols="30" rows="10"></textarea>
        <br><br>
        <label for="resume">Resume</label>
        <input type="file" id="resume" name="resume">
        <br><br>
        <button type="submit">Summit</button>

    </form>
</body>
</html>
